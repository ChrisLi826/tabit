<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="500" viewBox="0 0 820 500"
     font-family="ui-monospace, 'DejaVu Sans Mono', 'Menlo', monospace">
  <defs>
    <clipPath id="win"><rect x="16" y="16" width="788" height="468" rx="16"/></clipPath>
  </defs>

  <rect x="16" y="16" width="788" height="468" rx="16" fill="#101016"
        stroke="#7aa2f7" stroke-width="3"/>

  <g clip-path="url(#win)">
    <!-- sidebar surface -->
    <rect x="16" y="16" width="250" height="468" fill="#15151c"/>
    <line x1="266" y1="16" x2="266" y2="484" stroke="#2c2c38" stroke-width="1.5"/>
    <text x="34" y="44" fill="#7a7a88" font-size="11" letter-spacing="1.5">SESSIONS</text>

    <!-- ttyUSB0 · serial (cyan) -->
    <g transform="translate(16,54)">
      <g transform="translate(22,11)" fill="none" stroke="#7dcfff" stroke-width="1.4">
        <circle cx="4" cy="4" r="2" fill="#7dcfff" stroke="none"/>
        <circle cx="14" cy="4" r="2" fill="#7dcfff" stroke="none"/>
        <circle cx="9" cy="14" r="2" fill="#7dcfff" stroke="none"/>
        <line x1="4" y1="4" x2="14" y2="4"/><line x1="4" y1="4" x2="9" y2="14"/><line x1="14" y1="4" x2="9" y2="14"/>
      </g>
      <text x="48" y="20" fill="#ececf4" font-size="14">ttyUSB0</text>
      <text x="48" y="35" fill="#7a7a88" font-size="10">screen @115200</text>
    </g>

    <!-- shell · SELECTED (green) -->
    <g transform="translate(16,96)">
      <rect x="8" y="2" width="230" height="36" rx="6" fill="#7aa2f7" fill-opacity="0.18"/>
      <rect x="8" y="2" width="3" height="36" fill="#7aa2f7"/>
      <g transform="translate(22,11)" fill="none" stroke="#9ece6a" stroke-width="1.4">
        <rect x="1" y="3" width="16" height="12" rx="2"/>
        <polyline points="4,7 7,9 4,11"/>
        <line x1="9" y1="11" x2="13" y2="11"/>
      </g>
      <text x="48" y="20" fill="#ececf4" font-size="14">shell</text>
      <text x="48" y="35" fill="#7a7a88" font-size="10">~/project</text>
    </g>

    <!-- claude · AI (blue box) -->
    <g transform="translate(16,138)">
      <g transform="translate(22,10)">
        <rect x="1" y="1" width="16" height="16" rx="3" fill="#1a2744" stroke="#7aa2f7" stroke-width="1"/>
        <text x="9" y="13" font-size="9" font-weight="bold" fill="#b4ccff" text-anchor="middle">AI</text>
      </g>
      <text x="48" y="20" fill="#ececf4" font-size="14">claude</text>
      <text x="48" y="35" fill="#7a7a88" font-size="10">~/project</text>
      <circle cx="228" cy="21" r="3" fill="#7aa2f7"/>
    </g>

    <!-- notes.md · note (yellow) -->
    <g transform="translate(16,180)">
      <g transform="translate(22,11)" fill="none" stroke="#e0af68" stroke-width="1.4">
        <path d="M3 2 h8 l4 4 v10 h-12 z"/>
        <path d="M11 2 v4 h4"/>
        <line x1="5" y1="9" x2="12" y2="9"/><line x1="5" y1="12" x2="12" y2="12"/><line x1="5" y1="15" x2="9" y2="15"/>
      </g>
      <text x="48" y="20" fill="#ececf4" font-size="14">notes.md</text>
      <text x="48" y="35" fill="#7a7a88" font-size="10">~/docs</text>
    </g>

    <!-- r7000 · command (red) -->
    <g transform="translate(16,222)">
      <g transform="translate(22,11)" fill="none" stroke="#f7768e" stroke-width="1.4">
        <circle cx="9" cy="9" r="4.5"/>
        <circle cx="9" cy="9" r="1.6" fill="#f7768e" stroke="none"/>
        <line x1="9" y1="1.5" x2="9" y2="3.5"/><line x1="9" y1="14.5" x2="9" y2="16.5"/>
        <line x1="1.5" y1="9" x2="3.5" y2="9"/><line x1="14.5" y1="9" x2="16.5" y2="9"/>
      </g>
      <text x="48" y="20" fill="#ececf4" font-size="14">r7000</text>
      <text x="48" y="35" fill="#7a7a88" font-size="10">ssh 192.168.1.1</text>
      <circle cx="228" cy="21" r="3" fill="#7aa2f7"/>
    </g>

    <!-- devbox · tmux (purple grid) -->
    <g transform="translate(16,264)">
      <g transform="translate(22,11)" fill="#bb9af7">
        <rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/>
        <rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/>
      </g>
      <text x="48" y="20" fill="#ececf4" font-size="14">devbox</text>
      <text x="48" y="35" fill="#7a7a88" font-size="10">tmux</text>
    </g>

    <!-- adder strip (vertical, like the app) — icon + label per button -->
    <rect x="16" y="312" width="250" height="172" fill="#0e0e14"/>
    <line x1="16" y1="312" x2="266" y2="312" stroke="#2c2c38" stroke-width="1"/>
    <g font-size="13" fill="#9a9aa8">
      <!-- + Serial (cyan network) -->
      <g transform="translate(92,331)" fill="none" stroke="#7dcfff" stroke-width="1.4">
        <circle cx="4" cy="4" r="2" fill="#7dcfff" stroke="none"/><circle cx="14" cy="4" r="2" fill="#7dcfff" stroke="none"/><circle cx="9" cy="14" r="2" fill="#7dcfff" stroke="none"/>
        <line x1="4" y1="4" x2="14" y2="4"/><line x1="4" y1="4" x2="9" y2="14"/><line x1="14" y1="4" x2="9" y2="14"/>
      </g>
      <text x="118" y="344">+ Serial</text>

      <!-- + Shell (green terminal) -->
      <g transform="translate(92,357)" fill="none" stroke="#9ece6a" stroke-width="1.4">
        <rect x="1" y="3" width="16" height="12" rx="2"/><polyline points="4,7 7,9 4,11"/><line x1="9" y1="11" x2="13" y2="11"/>
      </g>
      <text x="118" y="370">+ Shell</text>

      <!-- + AI (blue box) -->
      <g transform="translate(92,383)">
        <rect x="1" y="1" width="16" height="16" rx="3" fill="#1a2744" stroke="#7aa2f7" stroke-width="1"/>
        <text x="9" y="13" font-size="9" font-weight="bold" fill="#b4ccff" text-anchor="middle">AI</text>
      </g>
      <text x="118" y="396">+ AI</text>

      <!-- + Note (yellow document) -->
      <g transform="translate(92,409)" fill="none" stroke="#e0af68" stroke-width="1.4">
        <path d="M3 2 h8 l4 4 v10 h-12 z"/><path d="M11 2 v4 h4"/>
        <line x1="5" y1="9" x2="12" y2="9"/><line x1="5" y1="12" x2="12" y2="12"/><line x1="5" y1="15" x2="9" y2="15"/>
      </g>
      <text x="118" y="422">+ Note</text>

      <!-- + Command (red gear) -->
      <g transform="translate(92,435)" fill="none" stroke="#f7768e" stroke-width="1.4">
        <circle cx="9" cy="9" r="4.5"/><circle cx="9" cy="9" r="1.6" fill="#f7768e" stroke="none"/>
        <line x1="9" y1="1.5" x2="9" y2="3.5"/><line x1="9" y1="14.5" x2="9" y2="16.5"/><line x1="1.5" y1="9" x2="3.5" y2="9"/><line x1="14.5" y1="9" x2="16.5" y2="9"/>
      </g>
      <text x="118" y="448">+ Command</text>

      <!-- + tmux (purple grid) -->
      <g transform="translate(92,461)" fill="#bb9af7">
        <rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/>
      </g>
      <text x="118" y="474">+ tmux</text>
    </g>

    <!-- content pane: shell prompt -->
    <text x="292" y="70"  font-size="14"><tspan fill="#9ece6a">$</tspan><tspan fill="#d5d5df"> make flash</tspan></text>
    <text x="292" y="94"  font-size="14" fill="#6a6a78">  flashing … done</text>
    <text x="292" y="130" font-size="14"><tspan fill="#bb9af7">$</tspan><tspan fill="#d5d5df"> tmux new -A -s devbox</tspan></text>
    <text x="292" y="154" font-size="14" fill="#6a6a78">  [devbox] attached — 3 windows</text>
    <text x="292" y="190" font-size="14"><tspan fill="#7dcfff">$</tspan><tspan fill="#d5d5df"> picocom -b 115200 /dev/ttyUSB0</tspan></text>
    <text x="292" y="214" font-size="14" fill="#6a6a78">  Terminal ready</text>
    <text x="292" y="250" font-size="14"><tspan fill="#9ece6a">$</tspan></text>
    <rect x="304" y="239" width="9" height="16" fill="#d5d5df"/>

    <text x="292" y="452" font-size="13" fill="#7a7a88">shells · serial · AI · notes · commands · tmux</text>
  </g>
</svg>
